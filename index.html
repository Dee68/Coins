<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Tosst</title>
    <style>
        body {
            perspective: 800px;
            background-color: #ccc;
        }
        h1 {
            text-align: center;
        }
               
        #coinImageID{
            display: block;
            margin: 1rem auto;
        
        }
  

        .flip{
            animation: coinFlip 0.9s ease-in-out;
        }

        @keyframes coinFlip{
            from { transform: rotateY(0deg); }
            to   { transform: rotateY(1080deg); } /* 3 full spins */
        }
        

        /* flip animation */
        /* .flip {
            animation: flip 1s ease-in
        }

         @keyframes flip {
            0%   { transform: rotateX(0deg); }
            25%  { transform: rotateX(90deg); } 
            50%  { transform: rotateX(180deg); }
            75%  { transform: rotateX(270deg); } 
            100% { transform: rotateX(300deg); }
        } */
       .buttonsContainer {
            display: flex;             /* use flexbox for horizontal alignment */
            justify-content: center;   /* center the row horizontally */
            gap: 15px;                 /* space between buttons */
            margin: 20px 0;            /* vertical spacing above/below */
        }

        .buttonsContainer button {
            padding: 10px 20px;        /* button padding */
            font-size: 16px;           /* text size */
            border-radius: 8px;        /* rounded corners */
            border: 1px solid #ccc;    /* subtle border */
            background-color: #f0f0f0;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .buttonsContainer button:hover {
            background-color: #4CAF50; /* hover background */
            color: white;              /* hover text color */
            transform: scale(1.05);    /* slight zoom on hover */
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .buttonsContainer button.active {
            background-color: #2196F3; /* change color when active */
            color: white;              /* text color */
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transform: scale(1.05);
        }
       .card{
            text-align: center;
            align-content: center;
            width: 70%;
            background-color: white;
            color:#333;
            border: 2px solid #ccc;
            border-radius: 10px;
            padding: 16px;
            margin-top: 16px;
            margin-left: 15%;
            margin-right: 20%;
            box-shadow: 0px 2px 6px rgba(161, 137, 137, 0.937);
            transition: transform 0.3s ease, box-shadow 0.3s ease; 
    } 
        
    .card:hover{
            box-shadow: 0px 4px 12px rgba(35, 186, 98, 0.9); 
            transform: scale(1.02);
            
        }
    table,th,td {
        border: 1px solid rgb(230, 182, 182);
    }
    table {
        width: 100%;
        border-collapse: collapse;
        position: relative;
        margin-top: 20px;
        
    }

    </style>
</head>
<body >
    <h1>Coin Toss</h1>

     <div class="buttonsContainer">
        <button id = "tossCoinButtonID">Toss Coin</button>
        <button id="startButton">Start Toss</button>
        <button id="stopButton">Stop</button>
        <button id="toggleAutoToss">Toggle</button>
     </div>
   
   
    <img id="coinImageID" src= "images/tailsTP.png" alt="Coin Tails" height = "120px" >

    <br>
    <br>
    <div class="card">
        <h3>DISPLAY STATICS OF COIN TOSSES</h3>
        <table>
            <tr>
                <th>Tosses</th>
                <th>Tails</th>
                <th>Heads</th>
            </tr>
            <tr>
                <td id="tossCount">
                 0
                </td>
                <td id="tossTails"> 0</td>
                <td id="tossHeads"> 0</td>
            </tr>
        </table>
    </div>

    <script>
            // setInterval(tossCoin,2000);
            // get all buttons in the container
            const allButtons = document.querySelectorAll(".buttonsContainer button");
         
            const tossCoinButton = document.getElementById("tossCoinButtonID");
            const coinImage = document.getElementById("coinImageID");
            const headCount = document.getElementById("tossHeads");
            const tailCount = document.getElementById("tossTails");
            const totalCount = document.getElementById("tossCount");
            const startButton = document.getElementById("startButton");
            const stopButton = document.getElementById("stopButton");
            const toggleButton = document.getElementById("toggleAutoToss");
            let numberTosses = 0;
            let countTails = 0;
            let countHeads = 0;
            let autoTimer = null;
            const maxTosses = 100;//max number of tosses
                      
            tossCoinButton.addEventListener("click", tossCoin);
            startButton.addEventListener("click", startToss);
            stopButton.addEventListener("click", stopToss);
            toggleButton.addEventListener("click",toggleToss);
           //toggle the start and stop actions depending on the timer value
            function toggleToss(){
                if (autoTimer === null) {
                    startToss();
                } else {
                    stopToss();
                }
            }

         // stops the toss from the button click & sets timer to null
            function stopToss(){

                if(autoTimer !== null){
                    clearTimeout(autoTimer);
                    autoTimer = null;
                }
            }

            // We can listen for when the animatation of coinImage element is completed
            // coinImage.addEventListener("animationend", function(){alert("Animation complete");})
           
            function flipCoinImage(coinImageFile){

                // animate the coin flip by applying the 
                // flip aimation class
              
                //Code required for animation to run on each click
                coinImage.classList.remove("flip");     // remove the class if it already exists
                coinImage.offsetWidth;                  // performs a reset
                coinImage.classList.add("flip");        // starts the animination


                coinImage.src =coinImageFile;   // display the coin image
                
            }


            function tossCoin(){
                
           
                // generate a random number between 1 and 2
                // 1 is heads, 2 is tails
                numberTosses++
                const coinValue = Math.floor(Math.random() * 2) + 1; // generates a number between 1 and 2
                let coinImageFile = "";
                if(coinValue == 1){
                    coinImageFile = "images/headsTP.png";  // change the image source to heads - note forward slashes are used in the path
                    coinImage.alt = "Coin Heads";  // change the alt text to match the new image
                    countHeads++;
                    
                } else {
                    coinImageFile = "images/tailsTP.png";  // change the image source to tails
                    coinImage.alt = "Coin Tails";  // change the alt text to match the new image
                    countTails++;
                    
                }
                flipCoinImage(coinImageFile)   // animated display of coin

               
               displayResult();
            }
            function displayResult(){
                totalCount.textContent = numberTosses;
                headCount.textContent = countHeads;
                tailCount.textContent = countTails;
            }
           
        //checks for maxTosses before tossing coin and sets auto timer
        function run(){

            if(numberTosses >= maxTosses){
                stopToss();
                return;
            }

            tossCoin();

            autoTimer = setTimeout(run, 5000);
        }
       //starts the toss from button click
        function startToss(){

            if(autoTimer !== null) return;

            run();
        }
        //enable active button background color change
        // attach click event to each button
        allButtons.forEach(btn => {
            btn.addEventListener("click", () => {

                // remove active from all buttons if any
                allButtons.forEach(b => b.classList.remove("active"));

                // add active to the clicked button
                btn.classList.add("active");
            });
        });

    </script>

   
    
</body>
</html>
